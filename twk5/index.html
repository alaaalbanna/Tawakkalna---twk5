<body>
    <!-- Header Section -->
    <div class="header">
        <img src="img/NCM_logo_AE_center.png" alt="المركز الوطني للأرصاد" class="logo">
        <h6 class="page-title" data-i18n="index.title">خدمات التراخيص و التصاريح الأرصادية</h6>
        <h4 class="page-subtitle" data-i18n="index.subtitle">طلب تصريح/ ترخيص مزاولة مهنة راصد</h4>
        <!--<p class="page-subtitle">المركز الوطني للأرصاد - المملكة العربية السعودية</p>-->
    </div>

    <!-- Cards Container -->
    <div class="cards-container">
        <!-- Card 1: Service Request -->
        <div class="service-card" onclick="goToServiceRequest()">
            <div class="card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
            </div>
            <h2 class="card-title" data-i18n="index.card1.title">طلب خدمة جديد</h2>
            <p class="card-description" data-i18n="index.card1.desc">
                تقديم طلب للحصول على تصريح أو ترخيص لمزاولة مهنة راصد جوي. يمكنك من خلال هذه الخدمة إصدار تصريح جديد، تجديد تصريح قائم، أو طلب بدل فاقد.
            </p>
            <button class="card-button">
                <span data-i18n="index.card1.btn">ابدأ طلب جديد</span>
                <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 5 12 12 19"/>
                </svg>
            </button>
        </div>

        <!-- Card 2: Track Requests -->
