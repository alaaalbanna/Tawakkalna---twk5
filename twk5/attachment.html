<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المرفقات - خدمة الراصد الجوي</title>

  <link rel="stylesheet" href="css/attachment.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <script src="js/twkhelper/twkhelper.js"></script>

  <script src="js/app_context.js"></script>
  <script src="js/i18n.js" defer></script>

  <!-- IMPORTANT: m.js should run before api.js -->
  <script src="js/attachment_m.js" defer></script>
  <script src="js/attachment_api.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>
  <div class="wizard-header">
    <div class="wizard-steps">
      <div class="wizard-step completed">
        <div class="step-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="step-title" data-i18n="wizard.step1">اتفاقية الاستخدام</div>
      </div>

      <div class="wizard-step completed">
        <div class="step-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="step-title" data-i18n="wizard.step2">البيانات الأساسية</div>
      </div>

      <div class="wizard-step active">
        <div class="step-icon">3</div>
        <div class="step-title" data-i18n="wizard.step3">المرفقات</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title" data-i18n="attachment.page_title">رفع المرفقات المطلوبة</h1>
      <p class="page-description" data-i18n="attachment.desc">
        يُرجى رفع جميع المستندات المطلوبة. المرفقات الإلزامية ضرورية لإتمام الطلب.
      </p>

      <div class="service-info">
        <svg class="service-info-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>

        <div class="service-info-text" data-i18n-html="attachment.service_info">
          نوع الخدمة المختار: <strong id="serviceTypeName">-</strong>
        </div>
      </div>
    </div>

    <div class="attachments-grid" id="attachmentsGrid"></div>

    <div class="form-navigation">
      <button type="button" class="nav-btn btn-prev" onclick="goBack()" data-i18n="attachment.btn.prev">السابق</button>
      <button id="submitBtn" type="button" class="nav-btn btn-next" data-i18n="attachment.btn.submit">إرسال الطلب</button>
    </div>

    <pre id="debugBox" style="display:none; white-space:pre-wrap; direction:ltr; text-align:left;"></pre>
  </div>
</body>
</html>
